# =============================================
# VNMine - Hệ Thống Công Pháp & Kỹ Năng
# =============================================

# Bật/tắt hệ thống skill
enabled: true

# =============================================
# SÁCH KỸ NĂNG (SKILL BOOKS)
# =============================================
books:
  enabled: true
  # Tỉ lệ giữ lại sách khi học thất bại (%)
  keep-on-fail-chance: 10
  # ID item material cho sách
  material: "BOOK"
  # Tên sách
  name: "&6◆ Sách Công Pháp ◆"
  lore:
    - "&7Sách cổ ghi lại công pháp thượng cổ"
    - "&7Click chuột phải để học"
    - ""

# =============================================
# HỆ THỐNG THÀNH THỤC (MASTERY)
# =============================================
mastery:
  enabled: true
  # EXP cơ bản mỗi lần dùng skill
  exp-per-use-base: 10
  # Hệ số nhân EXP theo phẩm cấp skill
  exp-per-use-multiplier-per-grade:
    HOANG: 1.0
    HUYEN: 1.5
    DIA: 2.0
    THIEN: 3.0

  # Định nghĩa các cấp thành thục
  levels:
    NHAP_MON:
      name: "&7Nhập Môn"
      exp-required: 0
      damage-multiplier: 1.0
      defense-multiplier: 1.0
      heal-multiplier: 1.0
      cooldown-reduction: 0.0
      mana-cost-reduction: 0.0
    TIEU_THANH:
      name: "&aTiểu Thành"
      exp-required: 100
      damage-multiplier: 1.3
      defense-multiplier: 1.2
      heal-multiplier: 1.2
      cooldown-reduction: 0.05
      mana-cost-reduction: 0.05
    DAI_THANH:
      name: "&bĐại Thành"
      exp-required: 300
      damage-multiplier: 1.6
      defense-multiplier: 1.5
      heal-multiplier: 1.5
      cooldown-reduction: 0.1
      mana-cost-reduction: 0.1
    VIEN_MAN:
      name: "&eViên Mãn"
      exp-required: 600
      damage-multiplier: 2.0
      defense-multiplier: 1.8
      heal-multiplier: 1.8
      cooldown-reduction: 0.15
      mana-cost-reduction: 0.15
    XUAT_THAN_NHAP_HOA:
      name: "&5Xuất Thần Nhập Hóa"
