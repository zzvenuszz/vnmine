# =============================================
# VNMine Permission System (Like LuckPerms)
# File cấu hình riêng cho hệ thống phân quyền
# =============================================

# Bật/tắt hệ thống permission
enabled: true

# =============================================
# ĐỊNH NGHĨA NHÓM (GROUPS)
# =============================================
# Mỗi nhóm có:
#   weight:     Độ ưu tiên (số càng cao càng mạnh)
#   prefix:     Tiền tố hiển thị trước tên
#   suffix:     Hậu tố hiển thị sau tên
#   default:    Nhóm mặc định cho người chơi mới
#   parents:    Nhóm cha (kế thừa permissions)
#   permissions: Danh sách quyền hạn
# =============================================
groups:
  default:
    weight: 0
    prefix: "&7"
    suffix: ""
    default: true
    parents: []
    permissions:
      - vnmine.time.status
      - vnmine.command.vnmine
      - minecraft.command.me
      - minecraft.command.tell
      - minecraft.command.help
      - minecraft.command.list

  member:
    weight: 10
    prefix: "&7[Member]"
    suffix: ""
    default: false
    parents:
      - default
    permissions:
      - vnmine.command.tps

  vip:
    weight: 20
    prefix: "&6[VIP]"
    suffix: ""
    default: false
    parents:
      - member
    permissions:
      - essentials.fly
      - essentials.feed
      - essentials.heal
      - minecraft.command.fly

  admin:
    weight: 100
    prefix: "&c[Admin]"
    suffix: ""
    default: false
    parents:
      - member
    permissions:
      - vnmine.*
      - vnmine.command.admin
      - minecraft.command.op
      - minecraft.command.deop
      - minecraft.command.gamemode
      - minecraft.command.ban
      - minecraft.command.kick
      - minecraft.command.whitelist
      - minecraft.command.save-all

  owner:
    weight: 200
    prefix: "&4&l[Owner]"
    suffix: ""
    default: false
    parents:
      - admin
    permissions:
      - "*"

# =============================================
# DỮ LIỆU NGƯỜI CHƠI (PLAYERS)
# =============================================
# Mỗi người chơi có thể ghi đè:
#   group:       Nhóm chính
#   permissions: Quyền riêng (thêm vào nhóm)
#   prefix:      Ghi đè prefix của nhóm
#   suffix:      Ghi đè suffix của nhóm
# =============================================
players: {}