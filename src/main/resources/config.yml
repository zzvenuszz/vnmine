# =============================================
# I. THỜI GIAN NGÀY/ĐÊM
# =============================================
day-minutes: 10
night-minutes: 10

# =============================================
# II. HỆ THỐNG PHÂN QUYỀN (Like LuckPerms)
# =============================================
permission-system:
  enabled: true
  groups:
    default:
      weight: 0
      prefix: "&7"
      suffix: ""
      default: true
      parents: []
      permissions:
        - vnmine.time.status
        - vnmine.command.vnmine
        - minecraft.command.me
        - minecraft.command.tell
        - minecraft.command.help
        - minecraft.command.list
    member:
      weight: 10
      prefix: "&7[Member]"
      suffix: ""
      default: false
      parents: [default]
      permissions:
        - vnmine.command.tps
    vip:
      weight: 20
      prefix: "&6[VIP]"
      suffix: ""
      default: false
      parents: [member]
      permissions:
        - essentials.fly
        - essentials.feed
        - essentials.heal
        - minecraft.command.fly
    admin:
      weight: 100
      prefix: "&c[Admin]"
      suffix: ""
      default: false
      parents: [member]
      permissions:
        - vnmine.*
        - vnmine.time.*
        - vnmine.command.*
        - vnmine.perm.*
        - vnmine.world.*
        - vnmine.drop.*
        - minecraft.command.op
        - minecraft.command.deop
        - minecraft.command.gamemode
        - minecraft.command.ban
        - minecraft.command.kick
  players: {}

# =============================================
# III. WORLD GENERATION
# =============================================
