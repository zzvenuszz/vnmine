# =============================================
# Plugin đa năng - VNMine Tu Tiên
# Cấu hình đầy đủ với hệ thống tu luyện, skill, pháp bảo
# =============================================

# =============================================
# I. THỜI GIAN NGÀY/ĐÊM
# =============================================
day-minutes: 10
night-minutes: 10

# =============================================
# II. HỆ THỐNG PHÂN QUYỀN (Like LuckPerms)
# =============================================
permission-system:
  enabled: true
  groups:
    default:
      weight: 0
      prefix: "&7"
      suffix: ""
      default: true
      parents: []
      permissions:
        - vnmine.time.status
        - vnmine.command.vnmine
        - minecraft.command.me
        - minecraft.command.tell
        - minecraft.command.help
        - minecraft.command.list
    member:
      weight: 10
      prefix: "&7[Member]"
      suffix: ""
      default: false
      parents: [default]
      permissions:
        - vnmine.command.tps
    vip:
      weight: 20
      prefix: "&6[VIP]"
      suffix: ""
      default: false
      parents: [member]
      permissions:
        - essentials.fly
        - essentials.feed
        - essentials.heal
        - minecraft.command.fly
    admin:
      weight: 100
      prefix: "&c[Admin]"
      suffix: ""
      default: false
      parents: [member]
      permissions:
        - vnmine.*
        - vnmine.time.*
        - vnmine.command.*
        - vnmine.perm.*
        - vnmine.world.*
        - vnmine.drop.*
        - minecraft.command.op
        - minecraft.command.deop
        - minecraft.command.gamemode
        - minecraft.command.ban
        - minecraft.command.kick
  players: {}

# =============================================
# III. WORLD GENERATION
# =============================================
world-settings:
  enabled: true
  worlds:
    vnmine_world:
      generate-if-not-exists: true
      seed: ""
      type: NORMAL
      environment: NORMAL
      ore-rates:
        coal_ore: 1.0
        iron_ore: 0.8
        gold_ore: 0.6
        diamond_ore: 0.5
        emerald_ore: 0.3
        redstone_ore: 0.7
        lapis_ore: 0.7
        copper_ore: 0.9
        ancient_debris: 0.4
      structure-rates:
        ancient_city: 0.3
        stronghold: 0.5
        mineshaft: 0.6
        fortress: 0.4
        bastion_remnant: 0.5
        monument: 0.4
        mansion: 0.3
        village: 0.8
        trial_chambers: 0.5
        ruined_portal: 0.7
        shipwreck: 0.6
        desert_pyramid: 0.5
        jungle_pyramid: 0.5
        igloo: 0.6
        swamp_hut: 0.6
      mob-rates:
        hostiles: 2.0
        passive: 0.5
        ambient: 1.0
        water: 0.8

# =============================================
# IV. BLOCK DROP, TOOL BREAK & EXPLOSION SYSTEM
# =============================================
block-drop-settings:
  enabled: true
  replace-enabled: true
  break-enabled: true
  explode-enabled: true
  rules:
    - block: diamond_ore
      iron_pickaxe:
        drop-replace: { enabled: true, replace-block: coal, chance: 30 }
        tool-break: { enabled: true, chance: 5, message: "&cCúp sắt của bạn đã bị gãy!" }
        explode: { enabled: true, power: 3.0, break-blocks: true, set-fire: false, damage-player: true, chance: 10, message: "&cKhối kim cương phát nổ!" }
      diamond_pickaxe:
        drop-replace: { enabled: true, replace-block: coal, chance: 10 }
        tool-break: { enabled: true, chance: 1, message: "&cCúp kim cương của bạn bị nứt!" }
        explode: { enabled: true, power: 3.0, break-blocks: true, set-fire: false, damage-player: true, chance: 5, message: "&cKhối kim cương phát nổ!" }
    - block: deepslate_diamond_ore
      iron_pickaxe:
        drop-replace: { enabled: true, replace-block: cobblestone, chance: 50 }
        tool-break: { enabled: true, chance: 8, message: "&cCúp sắt của bạn vỡ tan!" }
        explode: { enabled: true, power: 3.5, break-blocks: true, set-fire: false, damage-player: true, chance: 15, message: "&cDeepslate kim cương phát nổ!" }
      diamond_pickaxe:
        drop-replace: { enabled: true, replace-block: coal, chance: 15 }
        tool-break: { enabled: true, chance: 2, message: "&cCúp kim cương của bạn bị hư hại!" }
        explode: { enabled: true, power: 3.5, break-blocks: true, set-fire: false, damage-player: true, chance: 8, message: "&cDeepslate kim cương phát nổ!" }
    - block: ancient_debris
      diamond_pickaxe:
        drop-replace: { enabled: true, replace-block: netherrack, chance: 25 }
        tool-break: { enabled: true, chance: 3, message: "&cCúp kim cương của bạn nứt vỡ!" }
        explode: { enabled: true, power: 5.0, break-blocks: true, set-fire: true, damage-player: true, chance: 20, message: "&4Ancient Debris phát nổ!" }
    - block: gold_ore
      stone_pickaxe:
        explode: { enabled: true, power: 2.0, break-blocks: true, set-fire: false, damage-player: true, chance: 5, message: "&eVàng phát nổ!" }
      iron_pickaxe:
        explode: { enabled: true, power: 2.0, break-blocks: true, set-fire: false, damage-player: true, chance: 3, message: "&eVàng phát nổ!" }
    - block: emerald_ore
      iron_pickaxe:
        drop-replace: { enabled: true, replace-block: emerald, chance: 20 }
        explode: { enabled: true, power: 2.5, break-blocks: true, set-fire: false, damage-player: true, chance: 8, message: "&aKhối ngọc lục bảo phát nổ!" }
    - block: nether_gold_ore
      stone_pickaxe:
        drop-replace: { enabled: true, replace-block: netherrack, chance: 40 }
        explode: { enabled: true, power: 2.0, break-blocks: true, set-fire: true, damage-player: true, chance: 12, message: "&6Vàng nether phát nổ!" }

# =============================================
# V. HỆ THỐNG TU LUYỆN (CULTIVATION)
# =============================================
cultivation:
  enabled: true
  exp-per-level-multiplier: 100
  
  # Cảnh giới (cứ 10 level = 1 đại cảnh giới)
  realms:
    1:
      name: "Khí Động"
      prefix: "&7[Khí Động"
    11:
      name: "Luyện Khí"
      prefix: "&a[Luyện Khí"
    21:
      name: "Trúc Cơ"
      prefix: "&b[Trúc Cơ"
    31:
      name: "Kim Đan"
      prefix: "&e[Kim Đan"
    41:
      name: "Nguyên Anh"
      prefix: "&6[Nguyên Anh"
    51:
      name: "Hóa Thần"
      prefix: "&c[Hóa Thần"
    61:
      name: "Hợp Thể"
      prefix: "&5[Hợp Thể"
    71:
      name: "Độ Kiếp"
      prefix: "&4[Độ Kiếp"
    81:
      name: "Đại Thừa"
      prefix: "&d[Đại Thừa"
    91:
      name: "Phi Thăng"
      prefix: "&6&l[Phi Thăng"
  
  # Nguồn EXP
  exp-sources:
    kill-mob: { enabled: true, amount: 10 }
    kill-elite: { enabled: true, amount: 50 }
    kill-boss: { enabled: true, amount: 200 }
    break-ore: { enabled: true, amount: 5 }
    fishing: { enabled: true, amount: 15 }
  
  # Linh lực (Mana)
  mana:
    base-max-mana: 100
    mana-per-level: 10
    regen:
      base-amount: 2
      regen-interval-ticks: 40
      combat-delay-ticks: 100
    display:
      bossbar-enabled: true
  
  # Lôi kiếp (Tribulation)
  tribulation:
    enabled: true
    damage:
      base: 5.0
      per-strike-multiplier: 1.5
    countdown-seconds: 5
    strike-interval-ticks: 20
    immunity-duration-seconds: 60
    broadcast:
      - "&6⚡ &l{player} &r&6đang độ {strikes} lần lôi kiếp!"
      - "&eCửu thiên thần lôi giáng lâm!"
    success:
      message:
        - "&d&l✦ THIÊN ĐẠO CHỨNG NHẬN ✦"
        - "&d&l{player} &r&dđã độ kiếp thành công!"
        - "&dBước vào &e&l{realm} &r&d!"
    fail:
      message: "&4☠ &l{player} &r&4đã độ kiếp thất bại! Tu vi giảm sút!"

