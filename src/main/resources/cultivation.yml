# =============================================
# VNMine - Hệ Thống Tu Luyện & Lôi Kiếp
# =============================================

# Bật/tắt hệ thống tu luyện
enabled: true

# EXP cần cho mỗi level = level * exp-per-level-multiplier
exp-per-level-multiplier: 100

# =============================================
# CẢNH GIỚI (REALMS)
# Mỗi 10 level = 1 đại cảnh giới
# =============================================
realms:
  1:
    name: "Khí Động"
    prefix: "&7[Khí Động"
  11:
    name: "Luyện Khí"
    prefix: "&a[Luyện Khí"
  21:
    name: "Trúc Cơ"
    prefix: "&b[Trúc Cơ"
  31:
    name: "Kim Đan"
    prefix: "&e[Kim Đan"
  41:
    name: "Nguyên Anh"
    prefix: "&6[Nguyên Anh"
  51:
    name: "Hóa Thần"
    prefix: "&c[Hóa Thần"
  61:
    name: "Hợp Thể"
    prefix: "&5[Hợp Thể"
  71:
    name: "Độ Kiếp"
    prefix: "&4[Độ Kiếp"
  81:
    name: "Đại Thừa"
    prefix: "&d[Đại Thừa"
  91:
    name: "Phi Thăng"
    prefix: "&6&l[Phi Thăng"

# =============================================
# NGUỒN EXP (EXP SOURCES)
# =============================================
exp-sources:
  kill-mob:
    enabled: true
    amount: 10
  kill-elite:
    enabled: true
    amount: 50
  kill-boss:
    enabled: true
    amount: 200
  break-ore:
    enabled: true
    amount: 5
  fishing:
    enabled: true
    amount: 15

# =============================================
# LINH LỰC (MANA)
# =============================================
mana:
  base-max-mana: 100
  mana-per-level: 10
  regen:
    base-amount: 2
    regen-interval-ticks: 40
    combat-delay-ticks: 100
  display:
    bossbar-enabled: true

# =============================================
# LÔI KIẾP (TRIBULATION)
# =============================================
tribulation:
  enabled: true
  # Config sát thương
  damage:
    base: 3.0
    per-strike-multiplier: 1.2
    damage-per-level: 0.8
    armor-reduction: 0.6
  countdown-seconds: 5
  strike-interval-ticks: 20
  immunity-duration-seconds: 60
  radius-per-level: 1.5
  exp-for-others: 50.0
  level-drop-on-fail: 1
  broadcast:
    - "&6⚡ &l{player} &r&6đang độ {strikes} lần lôi kiếp!"
    - "&eCửu thiên thần lôi giáng lâm! Tránh xa khu vực nguy hiểm!"
  success:
    message:
      - "&d&l✦ THIÊN ĐẠO CHỨNG NHẬN ✦"
      - "&d&l{player} &r&dđã độ kiếp thành công!"
      - "&dBước vào &e&l{realm} &r&d!"
  fail:
    message:
      - "&4☠ &l{player} &r&4đã độ kiếp thất bại! Tu vi giảm sút!"