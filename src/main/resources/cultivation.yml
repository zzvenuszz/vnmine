      enabled: true
      by-level:
        "1":
          particle: FLAME
          radius: 0.8
          count: 8
          speed: 0.02
          y-offset: 0.2
        "11":
          particle: SOUL_FIRE_FLAME
          radius: 1.0
          count: 10
          speed: 0.03
          y-offset: 0.3
        "21":
          particle: FLAME
          radius: 1.2
