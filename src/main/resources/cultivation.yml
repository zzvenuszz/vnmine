    base-duration: 300
    scale-duration: true
  THIEN_HOI_DAN:
    lore-template: "&7Hồi &a{heal}% HP &7+ &b{recover}% &7linh lực"
    base-heal: 50
    base-recover: 50
    scale-with-grade: true
  PHE_MA_DAN:
    lore-template: "&7Tăng &c{dmg}% &7sát thương &7vs quái &7trong &c{duration}s"
    base-dmg: 30
    base-duration: 120
    scale-with-grade: true
    scale-duration: true
  TRUONG_THO_DAN:
    lore-template: "&7Tự động hồi sinh 1 lần"
  # ============ 12 EFFECT MỚI ============
  KIM_CUONG_DAN:
    lore-template: "&7Giảm &b{dmg}% &7sát thương nhận vào, tăng giáp &7trong &b{duration}s"
