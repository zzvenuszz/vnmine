# ============================================================
# item-textures.yml - Cấu hình texture cho items
# 
# File này cho phép thay đổi texture của items mà không cần
# compile lại plugin. Khi có resource pack, chỉ cần sửa
# custom-model-data và material tương ứng.
#
# Format:
#   item_key:
#     material: MATERIAL_NAME      # Fallback material
#     custom-model-data: 1234      # Custom model data (0 = không dùng)
#     name: "&aTên Item"           # Tên hiển thị
#     lore:                        # Mô tả
#       - "&7Dòng 1"
#       - "&7Dòng 2"
# ============================================================

