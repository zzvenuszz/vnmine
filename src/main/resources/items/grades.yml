# =====================================
# grades.yml - Định nghĩa phẩm cấp
# =====================================
# File cấu hình này cho phép thay đổi hệ thống phẩm cấp
# mà không cần biên dịch lại code.

# ==================== ĐAN DƯỢC - 12 Phẩm Cấp ====================
# Hoàng Hạ=0, Hoàng Trung=1, Hoàng Thượng=2, Huyền Hạ=3, ..., Thiên Thượng=11
pill-grade-multipliers:
  - 1.0    # Hoàng Hạ
  - 1.3    # Hoàng Trung
  - 1.6    # Hoàng Thượng
  - 2.0    # Huyền Hạ
  - 2.5    # Huyền Trung
  - 3.0    # Huyền Thượng
  - 3.5    # Địa Hạ
  - 4.0    # Địa Trung
  - 5.0    # Địa Thượng
  - 6.0    # Thiên Hạ
  - 7.5    # Thiên Trung
  - 10.0   # Thiên Thượng

# ==================== ĐAN DƯỢC - Hiển thị phẩm cấp ====================
pill-grade-display:
  - "&7&oHoàng cấp &fHạ phẩm"
  - "&7&oHoàng cấp &eTrung phẩm"
  - "&7&oHoàng cấp &aThượng phẩm"
  - "&b&oHuyền cấp &fHạ phẩm"
  - "&b&oHuyền cấp &eTrung phẩm"
  - "&b&oHuyền cấp &aThượng phẩm"
  - "&5&oĐịa cấp &fHạ phẩm"
  - "&5&oĐịa cấp &eTrung phẩm"
  - "&5&oĐịa cấp &aThượng phẩm"
  - "&6&oThiên cấp &fHạ phẩm"
  - "&6&oThiên cấp &eTrung phẩm"
  - "&6&oThiên cấp &aThượng phẩm"

# ==================== ĐAN DƯỢC - Màu sắc theo phẩm cấp ====================
pill-grade-colors:
  - "WHITE"      # Hoàng Hạ
  - "YELLOW"     # Hoàng Trung
  - "LIME"       # Hoàng Thượng
  - "AQUA"       # Huyền Hạ
  - "ORANGE"     # Huyền Trung
  - "GREEN"      # Huyền Thượng
  - "PURPLE"     # Địa Hạ
  - "#FF00FF"    # Địa Trung
  - "RED"        # Địa Thượng
  - "#FFD700"    # Thiên Hạ
  - "#00FFFF"    # Thiên Trung
  - "#8B00FF"    # Thiên Thượng

# ==================== CÔNG PHÁP - 4 cấp × 3 phẩm ====================
skill-grades:
  - name: "Hoàng"
    color: "&7"
    subs:
      - name: "Hạ"
        color: "&f"
      - name: "Trung"
        color: "&e"
      - name: "Thượng"
        color: "&a"
  - name: "Huyền"
    color: "&b"
    subs:
      - name: "Hạ"
        color: "&f"
      - name: "Trung"
        color: "&e"
      - name: "Thượng"
        color: "&a"
  - name: "Địa"
    color: "&5"
    subs:
      - name: "Hạ"
        color: "&f"
      - name: "Trung"
        color: "&e"
      - name: "Thượng"
        color: "&a"
  - name: "Thiên"
    color: "&6"
    subs:
      - name: "Hạ"
        color: "&f"
      - name: "Trung"
        color: "&e"
      - name: "Thượng"
        color: "&a"

# ==================== PHÁP BẢO - 21 tiers ====================
